<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - MyKart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="grid" style="max-width: 400px; margin: 80px auto;">
    <section class="panel">
      <h2 style="text-align:center;">Login</h2>
      <form id="loginForm" class="form" style="grid-template-columns: 1fr;">
        <input type="text" id="username" class="input" placeholder="Username" required />
        <input type="password" id="password" class="input" placeholder="Password" required />
        <button type="submit" class="btn">Login</button>
      </form>
      <div id="loginError" class="empty hidden" style="margin-top:10px;color:#f87171;">
        Invalid credentials
      </div>
    </section>
  </main>

  <div id="loadingBar" class="loading hidden"></div>
  <script>
    const API_BASE = "http://localhost:8089/kart-service";
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const loadingBar = document.getElementById("loadingBar");

    function showLoading(on) {
      loadingBar.classList.toggle("hidden", !on);
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        showLoading(true);
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
          credentials: "include"
        });

        if (!res.ok) {
          loginError.classList.remove("hidden");
          return;
        }

        window.location.href = "index.html"; // go to dashboard
      } catch (err) {
        loginError.textContent = "Network error";
        loginError.classList.remove("hidden");
      } finally {
        showLoading(false);
      }
    });
  </script>
</body>
</html>

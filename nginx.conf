server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html application/json;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|html)$ {
        add_header Cache-Control "no-cache";
    }
}
